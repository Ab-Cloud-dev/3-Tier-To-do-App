trigger: none

# 🔹 GLOBAL VARIABLES (Available everywhere)
variables:
- name: var1
  value: globalValue

- name: changeVar
  value: initialValue

stages:

# =========================================================
# 🔹 STAGE 1: BASICS (Compile vs Runtime)
# =========================================================
- stage: Stage1_Basics
  displayName: "Stage 1 - Variable Basics"

  jobs:
  - job: Job1_Basic
    displayName: "Job 1 - Compile vs Runtime"

    steps:
    - script: |
        echo "Compile-time: ${{ variables.var1 }}"
        echo "Runtime: $(var1)"
      displayName: "Global Variable Access"

      # Output:
      # Compile-time: globalValue
      # Runtime: globalValue


# =========================================================
# 🔹 STAGE 2: VARIABLE UPDATE (Same Job)
# =========================================================
- stage: Stage2_Update
  displayName: "Stage 2 - Update Variable"

  jobs:
  - job: Job2_Update
    displayName: "Job 2 - Update Variable in Runtime"

    steps:
    - script: |
        echo "Before Update:"
        echo "Compile-time: ${{ variables.changeVar }}"
        echo "Runtime: $(changeVar)"
      displayName: "Before Update"

      # Output:
      # Compile-time: initialValue
      # Runtime: initialValue

    - bash: |
        echo "##vso[task.setvariable variable=changeVar]updatedValue"
      displayName: "Update Variable"

    - script: |
        echo "After Update:"
        echo "Compile-time: ${{ variables.changeVar }}"
        echo "Runtime: $(changeVar)"
      displayName: "After Update"

      # Output:
      # Compile-time: initialValue   ❗ does NOT change
      # Runtime: updatedValue       ✅ updated


# =========================================================
# 🔹 STAGE 3: JOB-LEVEL VARIABLE OVERRIDE
# =========================================================
- stage: Stage3_JobScope
  displayName: "Stage 3 - Job Scope"

  jobs:
  - job: Job3_Override
    displayName: "Job 3 - Override Variable"

    variables:
      var1: jobLevelValue   # 👈 overrides global

    steps:
    - script: |
        echo "Compile-time: ${{ variables.var1 }}"
        echo "Runtime: $(var1)"
      displayName: "Job-level Override"

      # Output:
      # Compile-time: jobLevelValue
      # Runtime: jobLevelValue


# =========================================================
# 🔹 STAGE 4: CROSS-JOB VARIABLE (IMPORTANT)
# =========================================================
- stage: Stage4_CrossJob
  displayName: "Stage 4 - Cross Job Variables"

  jobs:

  # 🔸 Job A → sets output variable
  - job: JobA
    displayName: "Producer Job"

    steps:
    - bash: |
        echo "##vso[task.setvariable variable=myOutput;isOutput=true]helloFromJobA"
      name: setVarStep

  # 🔸 Job B → consumes output variable
  - job: JobB
    displayName: "Consumer Job"
    dependsOn: JobA

    variables:
      fromJobA: $[ dependencies.JobA.outputs['setVarStep.myOutput'] ]

    steps:
    - script: |
        echo "Value from JobA: $(fromJobA)"
      displayName: "Use Output Variable"

      # Output:
      # Value from JobA: helloFromJobA


# =========================================================
# 🔹 STAGE 5: ENV VARIABLES
# =========================================================
- stage: Stage5_Env
  displayName: "Stage 5 - Environment Variables"

  jobs:
  - job: Job5_Env
    displayName: "Env Variable Demo"

    steps:
    - script: |
        echo "ENV VAR: $MYVAR"
      env:
        MYVAR: $(var1)

      displayName: "Environment Variable"

      # Output:
      # ENV VAR: globalValue